name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync with upstream
    runs-on: ubuntu-latest
    if: github.repository != 'lobehub/lobe-chat'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/lobehub/lobe-chat.git
          git fetch upstream
        continue-on-error: true

      - name: Sync upstream changes
        run: |
          # 检查是否已添加上游远程仓库
          if ! git remote | grep -q '^upstream$'; then
            echo "Error: Failed to add upstream remote"
            exit 1
          fi
          
          # 切换到主分支
          git checkout main
          
          # 尝试合并上游更改
          if git merge upstream/main --no-edit; then
            # 推送更改
            git push origin main
            echo "Successfully synced with upstream"
          else
            echo "Merge conflict occurred. Please sync manually"
            exit 1
          fi
