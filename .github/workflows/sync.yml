name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync with upstream
    runs-on: ubuntu-latest
    if: github.repository != 'lobehub/lobe-chat'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/lobehub/lobe-chat.git
          git fetch upstream
        continue-on-error: true

      - name: Sync upstream changes
        run: |
          git checkout main
          
          # 创建一个临时分支
          git checkout -b temp-sync
          
          # 合并上游更改，但排除 workflow 文件
          if git merge -X ignore-space-change --no-commit upstream/main; then
            # 撤销对 workflow 文件的更改
            git checkout HEAD .github/workflows/
            # 完成合并
            git commit -m "Sync upstream (excluding workflows)"
            git checkout main
            git merge temp-sync
            git push origin main
            git branch -D temp-sync
            echo "Successfully synced with upstream (excluding workflows)"
          else
            echo "Merge conflict occurred. Please sync manually"
            git merge --abort
            git checkout main
            git branch -D temp-sync
            exit 1
          fi
