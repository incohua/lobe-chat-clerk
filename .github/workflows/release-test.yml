name: Sync and Release

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at 00:00, adjust as needed
  workflow_dispatch:

jobs:
  sync-and-release:
    name: Sync and Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "lobehubbot"
          git config user.email "i@lobehub.com"

      - name: Sync Upstream Repository
        run: |
          git remote add upstream https://github.com/lobehub/lobe-chat.git
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only
          git push origin main

      - name: Check Upstream Version
        id: check_release
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/lobehub/lobe-chat/releases/latest | jq -r .tag_name)
          echo "Upstream latest version: $LATEST_RELEASE"
          CURRENT_TAG=$(git describe --tags `git rev-list --tags --max-count=1` 2>/dev/null || echo "v0.0.0")
          echo "Current repository tag: $CURRENT_TAG"

          if [ "$LATEST_RELEASE" != "$CURRENT_TAG" ]; then
            echo "New version detected: $LATEST_RELEASE"
            echo "new_version=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          else:
            echo "No new version detected"
            exit 0  # Exit early if no new version
          fi

      - name: Install bun
        if: steps.check_release.outputs.new_version != ''
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        if: steps.check_release.outputs.new_version != ''
        run: bun i

      - name: Run Basic Tests (Example)
        if: steps.check_release.outputs.new_version != ''
        run: |
          set -e
          bun run test-server:coverage
        env:
          DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres
          DATABASE_DRIVER: node
          NEXT_PUBLIC_SERVICE_MODE: server
          KEY_VAULTS_SECRET: LA7n9k3JdEcbSgml2sxfw+4TV1AzaaFU5+R176aQz4s=
          S3_PUBLIC_DOMAIN: https://example.com
          APP_URL: https://home.com

      - name: Create Release
        id: create_release
        if: steps.check_release.outputs.new_version != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          NEW_VERSION=${{ steps.check_release.outputs.new_version }}
          RELEASE_INFO=$(curl -s https://api.github.com/repos/lobehub/lobe-chat/releases/latest)
          RELEASE_BODY=$(echo "$RELEASE_INFO" | jq -r .body)

          git tag $NEW_VERSION
          git push origin $NEW_VERSION

          gh release create $NEW_VERSION \
            --title "$NEW_VERSION" \
            --notes "$RELEASE_BODY" \
            --target main
            
      - name: Notify Success
        if: success() && steps.check_release.outputs.new_version != ''
        uses: slackhq/slack-notifier@v2
        with:
          channel: '#your-channel-name' # Replace with your channel name
          status: 'success'
          message: 'Successfully released new version ${{ steps.create_release.outputs.new_version }} based on upstream! 🎉'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Failure
        if: failure() && steps.check_release.outputs.new_version != ''
        uses: slackhq/slack-notifier@v2
        with:
          channel: '#your-channel-name' # Replace with your channel name
          status: 'failure'
          message: 'Failed to release new version based on upstream. Check the logs for details. 😢'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
